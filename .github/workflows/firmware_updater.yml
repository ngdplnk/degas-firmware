# .github/workflows/firmware_updater.yml

name: 'Degas Firmware Updater'

on:
  # Schedule to run every day at 8:15 AM CLT (12:15 UTC)
  schedule:
    - cron: '15 12 * * *'
  
  workflow_dispatch:

jobs:
  check_and_release:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false # Ensures if one region fails, others will still run
      matrix:
        config:
          - { device: 'degas', region: 'global' }
          - { device: 'degas', region: 'ru' }        # Russian
          - { device: 'degas', region: 'id' }        # Indo (Indonesia)
          - { device: 'degas', region: 'eea' }       # EEA (Europe)
          - { device: 'degas', region: 'tw' }        # Taiwan
          - { device: 'degas', region: 'tr' }        # Turkey
          - { device: 'degas', region: 'global_dc' } # global_dc

    steps:
      - name: '📥 Checkout Repository'
        uses: actions/checkout@v4
        with:
          # Use the PAT to allow pushing changes
          token: ${{ secrets.GH_PAT }}

      - name: '🛠️ Setup Tools'
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip

      - name: '🔍 Fetch Latest Firmware Info'
        id: fetch_info
        run: |
          # This URL is an example from a known community API.
          API_URL="https://raw.githubusercontent.com/XiaomiFirmwareUpdater/mi-firm-auto-updater/master/data/devices/stable/${{ matrix.config.device }}.json"
          
          echo "Fetching data for ${{ matrix.config.device }} (${{ matrix.config.region }}) from ${API_URL}"
          
          FIRMWARE_JSON=$(curl -sL "${API_URL}" | jq --arg REGION "${{ matrix.config.region }}" '.[] | select(.branch == "stable" and .method == "fastboot" and .region == $REGION)')
          
          if [[ -z "$FIRMWARE_JSON" ]]; then
            echo "No firmware found for region: ${{ matrix.config.region }}"
            echo "IS_NEW=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          VERSION=$(echo "$FIRMWARE_JSON" | jq -r '.version')
          FILENAME=$(echo "$FIRMWARE_JSON" | jq -r '.filename')
          DOWNLOAD_URL=$(echo "$FIRMWARE_JSON" | jq -r '.download')
          
          echo "Found version: ${VERSION}"
          
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "FILENAME=${FILENAME}" >> $GITHUB_OUTPUT
          echo "DOWNLOAD_URL=${DOWNLOAD_URL}" >> $GITHUB_OUTPUT

          LATEST_FILE="latest_versions/${{ matrix.config.region }}.txt"
          mkdir -p latest_versions
          touch "$LATEST_FILE"
          
          STORED_VERSION=$(cat "$LATEST_FILE")
          
          echo "Stored version: ${STORED_VERSION}"
          
          if [[ "${VERSION}" != "${STORED_VERSION}" ]]; then
            echo "A new version is available! Proceeding to download."
            echo "IS_NEW=true" >> $GITHUB_OUTPUT
          else
            echo "No new version found. Stopping."
            echo "IS_NEW=false" >> $GITHUB_OUTPUT
          fi

      - name: '🔽 Download and Extract Firmware'
        if: steps.fetch_info.outputs.IS_NEW == 'true'
        run: |
          echo "Downloading ${{ steps.fetch_info.outputs.FILENAME }}..."
          curl -Lo ${{ steps.fetch_info.outputs.FILENAME }} "${{ steps.fetch_info.outputs.DOWNLOAD_URL }}"
          
          echo "Extracting files..."
          mkdir -p extracted_firmware
          tar -xvf ${{ steps.fetch_info.outputs.FILENAME }} -C extracted_firmware

      - name: '🚀 Create GitHub Release and Upload Files'
        if: steps.fetch_info.outputs.IS_NEW == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TAG="v${{ steps.fetch_info.outputs.VERSION }}-${{ matrix.config.region }}"
          
          echo "Creating release with tag: ${TAG}"
          
          gh release create "$TAG" \
            --title "Firmware v${{ steps.fetch_info.outputs.VERSION }} [${{ matrix.config.region }}]" \
            --notes "Automated release for ${{ matrix.config.device }} (${{ matrix.config.region }}). Download URL: ${{ steps.fetch_info.outputs.DOWNLOAD_URL }}" \
            extracted_firmware/*

      - name: '💾 Update Latest Version File'
        if: steps.fetch_info.outputs.IS_NEW == 'true'
        run: |
          LATEST_FILE="latest_versions/${{ matrix.config.region }}.txt"
          echo "${{ steps.fetch_info.outputs.VERSION }}" > "$LATEST_FILE"
          
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add "$LATEST_FILE"
          git commit -m "chore: update latest version for ${{ matrix.config.region }} to ${{ steps.fetch_info.outputs.VERSION }}"
          git push
